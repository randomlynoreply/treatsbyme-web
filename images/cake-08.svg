<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c4bc"/>
      <stop offset="100%" stop-color="#e8a89c"/>
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.15)"/>
    </pattern>
  </defs>
  <rect width="600" height="900" fill="url(#g)"/>
  <rect width="600" height="900" fill="url(#dots)"/>
  <!-- Cake icon -->
  <g transform="translate(300,430)" opacity="0.55">
    <!-- Tier 1 (bottom) -->
    <rect x="-48" y="20" width="96" height="32" rx="6" fill="rgba(255,255,255,0.6)"/>
    <rect x="-48" y="20" width="96" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
    <!-- Tier 2 (mid) -->
    <rect x="-34" y="-14" width="68" height="36" rx="5" fill="rgba(255,255,255,0.6)"/>
    <rect x="-34" y="-14" width="68" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
    <!-- Tier 3 (top) -->
    <rect x="-20" y="-42" width="40" height="30" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="-20" y="-42" width="40" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
    <!-- Candle -->
    <rect x="-2" y="-60" width="4" height="20" rx="2" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="0" cy="-61" rx="4" ry="5" fill="rgba(255,220,100,0.8)"/>
    <!-- Stars / flowers -->
    <circle cx="-35" cy="30" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="35" cy="30" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="-22" cy="-4" r="2.5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="22" cy="-4" r="2.5" fill="rgba(255,255,255,0.4)"/>
  </g>
  <!-- Label -->
  <text x="300" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="13"
    font-style="italic" fill="rgba(255,255,255,0.75)">Tall Tier</text>
  <text x="300" y="553" text-anchor="middle" font-family="Arial" font-size="9"
    letter-spacing="2" fill="rgba(255,255,255,0.45)">REPLACE WITH PHOTO</text>
</svg>