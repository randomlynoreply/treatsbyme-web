<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#f2cfc7"/>
  <!-- Simplified cake icon -->
  <g fill="none" stroke="#c97b6e" stroke-width="1.5" stroke-linecap="round">
    <!-- Bottom tier -->
    <rect x="4" y="20" width="24" height="8" rx="2" fill="#e8a89c" stroke="none"/>
    <!-- Middle tier -->
    <rect x="8" y="13" width="16" height="8" rx="2" fill="#c97b6e" stroke="none"/>
    <!-- Top tier -->
    <rect x="11" y="7" width="10" height="7" rx="2" fill="#a85d52" stroke="none"/>
    <!-- Candle -->
    <line x1="16" y1="3" x2="16" y2="7" stroke="#c97b6e" stroke-width="1.5"/>
    <circle cx="16" cy="2.5" r="1.5" fill="#f5d080" stroke="none"/>
  </g>
</svg>
